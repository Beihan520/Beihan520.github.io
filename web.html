<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>CF Pages 部署脚本生成器</title>
<style>
  body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; max-width: 800px; margin: 40px auto; padding: 20px; }
  h2 { color: #f6821f; border-bottom: 1px solid #f6821f; padding-bottom: 8px; }
  label { display: block; margin-top: 14px; color: #9cdcfe; font-size: 13px; }
  input, select { width: 100%; padding: 7px 10px; margin-top: 4px; background: #2d2d2d; border: 1px solid #444; color: #d4d4d4; font-family: monospace; font-size: 13px; border-radius: 4px; box-sizing: border-box; }
  input:focus, select:focus { outline: none; border-color: #f6821f; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button { margin-top: 20px; padding: 10px 28px; background: #f6821f; color: #fff; border: none; font-family: monospace; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; }
  button:hover { background: #faad3f; }
  .out-wrap { margin-top: 20px; position: relative; }
  textarea { width: 100%; height: 520px; background: #0d0d0d; border: 1px solid #333; color: #c8c8c8; font-family: monospace; font-size: 12px; padding: 12px; border-radius: 4px; box-sizing: border-box; resize: vertical; }
  .copy-btn { position: absolute; top: 8px; right: 8px; padding: 5px 14px; background: #333; color: #ccc; border: 1px solid #555; font-family: monospace; font-size: 12px; cursor: pointer; border-radius: 3px; }
  .copy-btn:hover { background: #444; }
  .hint { font-size: 11px; color: #666; margin-top: 3px; }
  .section { margin-top: 22px; padding: 14px; background: #252525; border-radius: 6px; border: 1px solid #333; }
  .section-title { color: #f6821f; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
</style>
</head>
<body>

<h2>☁ Cloudflare Pages 部署脚本生成器</h2>

<div class="section">
  <div class="section-title">账号配置</div>
  <div class="row">
    <div>
      <label>Cloudflare API Token</label>
      <input id="api_token" type="password" placeholder="cfat_xxxxx...">
      <div class="hint">Dashboard → My Profile → API Tokens</div>
    </div>
    <div>
      <label>Account ID</label>
      <input id="account_id" placeholder="32位十六进制">
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">项目配置</div>
  <div class="row">
    <div>
      <label>Pages 项目名称</label>
      <input id="project_name" placeholder="my-pages-project">
    </div>
    <div>
      <label>本地上传目录</label>
      <input id="upload_dir" placeholder="C:\dist">
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">环境变量</div>
  <div class="row">
    <div>
      <label>变量1 名称</label>
      <input id="var1_key" value="ADMIN">
    </div>
    <div>
      <label>变量1 值</label>
      <input id="var1_val" value="ADMIN">
    </div>
  </div>
  <div class="row">
    <div>
      <label>变量2 名称</label>
      <input id="var2_key" value="UUID">
    </div>
    <div>
      <label>变量2 值</label>
      <input id="var2_val" value="661471cc-c3c4-45d5-a2e9-3f243330510b">
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">KV 命名空间（留空跳过）</div>
  <div class="row">
    <div>
      <label>KV 命名空间名称</label>
      <input id="kv_title" placeholder="留空则跳过KV创建">
    </div>
    <div>
      <label>KV 绑定名称</label>
      <input id="kv_binding" value="KV">
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">兼容性</div>
  <div class="row">
    <div>
      <label>兼容性日期</label>
      <input id="compat_date" type="date">
    </div>
    <div>
      <label>兼容性标志</label>
      <select id="compat_flags">
        <option value="">（不设置）</option>
        <option value="nodejs_compat">nodejs_compat</option>
        <option value="nodejs_compat_v2">nodejs_compat_v2</option>
      </select>
    </div>
  </div>
</div>

<button onclick="generate()">生成 .bat 脚本</button>

<div class="out-wrap" id="out_wrap" style="display:none">
  <textarea id="output" readonly></textarea>
  <button class="copy-btn" onclick="copyScript()">复制</button>
</div>

<script>
window.onload = function() {
  var today = new Date().toISOString().slice(0,10);
  document.getElementById('compat_date').value = today;
};

function generate() {
  var token      = document.getElementById('api_token').value.trim();
  var accountId  = document.getElementById('account_id').value.trim();
  var projName   = document.getElementById('project_name').value.trim();
  var uploadDir  = document.getElementById('upload_dir').value.trim();
  var var1key    = document.getElementById('var1_key').value.trim();
  var var1val    = document.getElementById('var1_val').value.trim();
  var var2key    = document.getElementById('var2_key').value.trim();
  var var2val    = document.getElementById('var2_val').value.trim();
  var kvTitle    = document.getElementById('kv_title').value.trim();
  var kvBinding  = document.getElementById('kv_binding').value.trim() || 'KV';
  var compatDate = document.getElementById('compat_date').value;
  var compatFlags= document.getElementById('compat_flags').value;

  if (!token || !accountId || !projName || !uploadDir) {
    alert('请填写 API Token、Account ID、项目名称、上传目录');
    return;
  }

  var skipKV = kvTitle === '';

  // Build env_vars PS hashtable entries
  var envEntries = '';
  if (var1key) envEntries += var1key + '=@{value=\'' + var1val + '\'}';
  if (var1key && var2key) envEntries += '; ';
  if (var2key) envEntries += var2key + '=@{value=\'' + var2val + '\'}';

  // Flags array
  var flagsArr = compatFlags ? "'" + compatFlags + "'" : '';

  // KV section
  var kvSection = '';
  if (!skipKV) {
    kvSection = [
      '',
      'echo   -- STEP 2/5  创建 KV 命名空间',
      '',
      ':CREATE_KV',
      '> req_s2.json echo {"title":"' + kvTitle + '"}',
      '',
      'curl -s -X POST "%BASE_URL%/storage/kv/namespaces" ^',
      '  -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" ^',
      '  -H "Content-Type: application/json" ^',
      '  -d @req_s2.json -o res_s2.json',
      '',
      'findstr /c:"\\"success\\":true" res_s2.json >nul 2>&1',
      'if not errorlevel 1 (',
      '    for /f "usebackq delims=" %%I in (',
      '        `powershell -NoProfile -Command "(Get-Content \'res_s2.json\' | ConvertFrom-Json).result.id"`) do set KV_ID=%%I',
      '    echo   [OK] KV 创建成功，ID: !KV_ID!',
      '    goto :STEP3',
      ')',
      '',
      'echo   [NG] KV 创建失败（空间可能已存在）',
      'echo.',
      'echo   [1] 输入新名称重试  [2/回车] 跳过KV绑定',
      'echo.',
      'set C=',
      'set /p C=  选择: ',
      'if "!C!"=="1" (',
      '    set /p KV_TITLE=  新KV名称: ',
      '    goto :CREATE_KV',
      ')',
      'echo   [!] 跳过KV绑定，继续...',
    ].join('\r\n');
  } else {
    kvSection = '\r\necho   -- STEP 2/5  KV 命名空间（跳过）';
  }

  // KV patch fragment for PS
  var kvPsFrag = '';
  if (!skipKV) {
    kvPsFrag = "$kv = @{ '" + kvBinding + "' = @{ namespace_id=$kvId } }; $cfgP['kv_namespaces']=$kv; $cfgV['kv_namespaces']=$kv; ";
  }

  // STEP3 PowerShell build patch - written to ps1 via redirect
  // We write the ps1 using a here-doc approach with one echo per line
  // To avoid } issue in BAT redirect blocks: we write ps1 using SET + echo to file
  var step3 = [
    '',
    'echo   -- STEP 3/5  配置项目',
    '',
    '> build_patch.ps1 (',
    '    echo $kvId = if (Test-Path kv_id.tmp) { (Get-Content kv_id.tmp).Trim() } else { "!KV_ID!" }',
    '    echo $env_vars = @{ ' + envEntries + ' }',
    '    echo $cfgP = @{ env_vars=$env_vars; compatibility_date="' + compatDate + '"; compatibility_flags=@(' + flagsArr + ') }',
    '    echo $cfgV = @{ env_vars=$env_vars; compatibility_date="' + compatDate + '"; compatibility_flags=@(' + flagsArr + ') }',
    '    echo ' + kvPsFrag,
    '    echo $body = @{ deployment_configs=@{ production=$cfgP; preview=$cfgV } }',
    '    echo $json = $body ^| ConvertTo-Json -Depth 10 -Compress',
    '    echo [System.IO.File]::WriteAllBytes("patch_body.json", [System.Text.Encoding]::UTF8.GetBytes($json))',
    ')',
    'powershell -NoProfile -ExecutionPolicy Bypass -File build_patch.ps1',
    'if errorlevel 1 (',
    '    echo [NG] 生成配置失败',
    '    pause',
    ')',
    '',
    'curl -s -X PATCH "%BASE_URL%/pages/projects/%PROJECT_NAME%" ^',
    '  -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" ^',
    '  -H "Content-Type: application/json" ^',
    '  -d @patch_body.json -o res_s3.json',
    '',
    'findstr /c:"\\"success\\":true" res_s3.json >nul 2>&1',
    'if not errorlevel 1 (',
    '    echo   [OK] 项目配置成功',
    ') else (',
    '    echo   [NG] 配置失败，完整响应:',
    '    type res_s3.json',
    '    echo.',
    ')',
  ].join('\r\n');

  var script = [
    '@echo off',
    ':: 防止闪退：用 cmd /k 保持窗口',
    'if "%1"=="--run" goto :MAIN',
    'cmd /k "%~f0" --run',
    'exit /b',
    '',
    ':MAIN',
    'setlocal enabledelayedexpansion',
    'chcp 65001 >nul',
    '',
    ':: ================================================',
    ':: Cloudflare Pages Direct Upload 部署脚本',
    ':: ================================================',
    '',
    ':: ======== 固定配置 ========',
    'set CLOUDFLARE_API_TOKEN=' + token,
    'set CLOUDFLARE_ACCOUNT_ID=' + accountId,
    'set KV_BINDING_NAME=' + kvBinding,
    'set ' + var1key + '=' + var1key,
    'set ' + var1key + '_ZHI=' + var1val,
    'set ' + var2key + '=' + var2key,
    'set ' + var2key + '_ZHI=' + var2val,
    '',
    'set BASE_URL=https://api.cloudflare.com/client/v4/accounts/%CLOUDFLARE_ACCOUNT_ID%',
    '',
    ':: ================================================',
    ':: Banner',
    ':: ================================================',
    'cls',
    'echo.',
    'echo   ===========================================',
    'echo      Cloudflare Pages 直传部署工具 v3.0',
    'echo   ===========================================',
    'echo.',
    '',
    ':: ================================================',
    ':: STEP 0：收集配置',
    ':: ================================================',
    'echo   -- 基础配置',
    'echo.',
    '',
    'set PROJECT_NAME=' + projName,
    'set UPLOAD_DIR=' + uploadDir,
    '',
    'echo   项目名称   : %PROJECT_NAME%',
    'echo   上传目录   : %UPLOAD_DIR%',
    'echo.',
    '',
    ':: ================================================',
    ':: STEP 1：创建 Pages 项目',
    ':: ================================================',
    'echo.',
    'echo   -- STEP 1/5  创建 Pages 项目',
    '',
    ':CREATE_PROJECT',
    '> req_s1.json echo {"name":"%PROJECT_NAME%","production_branch":"main"}',
    '',
    'curl -s -X POST "%BASE_URL%/pages/projects" ^',
    '  -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" ^',
    '  -H "Content-Type: application/json" ^',
    '  -d @req_s1.json -o res_s1.json',
    '',
    'findstr /c:"\\"success\\":true" res_s1.json >nul 2>&1',
    'if not errorlevel 1 (',
    '    echo   [OK] 项目创建成功',
    '    goto :STEP2',
    ')',
    '',
    'findstr /c:"already exists" res_s1.json >nul 2>&1',
    'if not errorlevel 1 (',
    '    echo   [OK] 项目已存在，继续...',
    '    goto :STEP2',
    ')',
    '',
    'echo   [NG] 项目创建失败:',
    'type res_s1.json',
    'echo.',
    'pause',
    'exit /b 1',
    '',
    ':: ================================================',
    ':: STEP 2：创建 KV 命名空间',
    ':: ================================================',
    ':STEP2',
    'set KV_ID=',
    kvSection,
    '',
    ':: ================================================',
    ':: STEP 3：配置项目',
    ':: ================================================',
    ':STEP3',
    'echo.',
    step3,
    '',
    ':: ================================================',
    ':: STEP 4：部署文件',
    ':: ================================================',
    ':STEP4',
    'echo.',
    'echo   -- STEP 4/5  部署文件',
    'echo   项目名称: %PROJECT_NAME%',
    'echo   部署目录: %UPLOAD_DIR%',
    '',
    'call npx wrangler pages deploy "%UPLOAD_DIR%" --project-name "%PROJECT_NAME%"',
    '',
    'if %ERRORLEVEL% equ 0 (',
    '    echo.',
    '    echo [OK] 部署成功!',
    ') else (',
    '    echo.',
    '    echo [NG] 部署失败，请检查上方日志。',
    ')',
    '',
    ':: ================================================',
    ':: STEP 5：查看部署状态',
    ':: ================================================',
    ':STEP5',
    'echo.',
    'echo   -- STEP 5/5  查询部署状态',
    '',
    'curl -s -X GET "%BASE_URL%/pages/projects/%PROJECT_NAME%/deployments" ^',
    '  -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" ^',
    '  -o res_status.json',
    '',
    'for /f "usebackq delims=" %%S in (',
    '    `powershell -NoProfile -Command "(Get-Content \'res_status.json\' | ConvertFrom-Json).result[0].latest_stage.name + \' - \' + (Get-Content \'res_status.json\' | ConvertFrom-Json).result[0].latest_stage.status"`) do (',
    '    echo   部署状态: %%S',
    ')',
    '',
    ':: ================================================',
    ':: 清理',
    ':: ================================================',
    ':FINISH',
    'del /q req_s1.json req_s2.json res_s1.json res_s2.json res_s3.json ^',
    '        res_status.json patch_body.json build_patch.ps1 kv_id.tmp ^',
    '        >nul 2>&1',
    '',
    'echo.',
    'echo   ===========================================',
    'echo            全部步骤执行完毕',
    'echo   ===========================================',
    'echo.',
    'pause',
    'exit /b 0',
  ].join('\r\n');

  document.getElementById('output').value = script;
  document.getElementById('out_wrap').style.display = 'block';
  document.getElementById('output').scrollTop = 0;
}

function copyScript() {
  var ta = document.getElementById('output');
  ta.select();
  document.execCommand('copy');
  var btn = document.querySelector('.copy-btn');
  btn.textContent = '已复制!';
  setTimeout(function(){ btn.textContent = '复制'; }, 1500);
}
</script>
</body>
</html>
