<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CF Pages 部署配置器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --border: #e2e0db;
  --border-strong: #c8c5be;
  --text: #1a1917;
  --text-mid: #6b6860;
  --text-dim: #a09d98;
  --accent: #1a1917;
  --accent-inv: #f8f7f4;
  --red: #c0392b;
  --green: #27ae60;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --radius: 4px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

.wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 64px 24px 96px;
}

/* header */
.header { margin-bottom: 56px; }
.header-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
h1 {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
}
.header-sub {
  font-size: 13px;
  color: var(--text-mid);
}

/* divider */
hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

/* section */
.section { margin-bottom: 36px; }
.section-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* fields */
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 560px) { .field-grid { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 5px; }

.field label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  letter-spacing: .06em;
}
.field label .req { color: var(--red); margin-left: 2px; }

.field input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 11px;
  font-family: var(--mono);
  font-size: 12.5px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-dim); }
.field-hint {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--mono);
}

/* info */
.info {
  border-left: 2px solid var(--border-strong);
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-mid);
  margin-top: 12px;
  line-height: 1.7;
}
.info strong { color: var(--text); font-weight: 500; }

/* env rows */
.var-list { display: flex; flex-direction: column; gap: 8px; }
.var-row {
  display: grid;
  grid-template-columns: 1fr 1fr 32px;
  gap: 8px;
  align-items: end;
}
@media (max-width: 560px) { .var-row { grid-template-columns: 1fr; } }
.var-row.locked .field input { background: #f3f2ef; color: var(--text-mid); }

.add-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: all .15s;
  margin-top: 10px;
}
.add-btn:hover { border-color: var(--accent); color: var(--text); }

.del-btn {
  width: 32px;
  height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.del-btn:hover { border-color: var(--red); color: var(--red); }
.del-btn:disabled { opacity: .25; cursor: not-allowed; pointer-events: none; }

/* kv toggle */
.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  user-select: none;
  transition: border-color .15s;
  margin-bottom: 12px;
}
.toggle-row:hover { border-color: var(--border-strong); }
.toggle-row.on { border-color: var(--accent); }

.toggle-switch {
  width: 32px;
  height: 18px;
  background: var(--border-strong);
  border-radius: 9px;
  position: relative;
  transition: background .15s;
  flex-shrink: 0;
}
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  top: 3px;
  left: 3px;
  transition: transform .15s;
  box-shadow: 0 1px 2px rgba(0,0,0,.15);
}
.toggle-row.on .toggle-switch { background: var(--accent); }
.toggle-row.on .toggle-switch::after { transform: translateX(14px); }
.toggle-label { font-size: 13px; color: var(--text-mid); }
.toggle-row.on .toggle-label { color: var(--text); }

.collapsible { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
.collapsible.open { max-height: 400px; }

/* kv row */
.kv-block { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); }
@media (max-width: 560px) { .kv-block { grid-template-columns: 1fr; } }

/* generate */
.generate-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: var(--accent-inv);
  border: none;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity .15s;
  margin-top: 40px;
}
.generate-btn:hover { opacity: .85; }
.generate-btn:active { opacity: .7; }

/* preview */
.preview-section { margin-top: 40px; display: none; }
.preview-section.visible { display: block; }

.preview-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.preview-head .section-label { margin-bottom: 0; flex: 1; }

.dl-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  text-decoration: none;
  transition: background .15s;
}
.dl-btn:hover { background: var(--accent); color: var(--accent-inv); }

.preview-code {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.65;
  color: var(--text-mid);
  overflow-x: auto;
  white-space: pre;
  max-height: 400px;
  overflow-y: auto;
}
.preview-code::-webkit-scrollbar { width: 3px; height: 3px; }
.preview-code::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
</style>
</head>
<body>
<div class="wrap">

<!-- Header -->
<div class="header">
  <div class="header-label">Cloudflare Pages — Deploy Configurator</div>
  <h1>部署脚本生成器</h1>
  <p class="header-sub">填写参数，生成定制化 .bat 部署脚本</p>
</div>

<!-- §1 API 凭证 -->
<div class="section">
  <div class="section-label">01 · API 凭证</div>
  <div class="field-grid">
    <div class="field">
      <label>API_TOKEN<span class="req">*</span></label>
      <input id="apiToken" type="text" placeholder="cfat_...">
    </div>
    <div class="field">
      <label>ACCOUNT_ID<span class="req">*</span></label>
      <input id="accountId" type="text" placeholder="32位 hex">
    </div>
  </div>
  <div class="info">Token 需要 <strong>KV Storage</strong> 和 <strong>Pages</strong> 读写权限</div>
</div>

<hr>

<!-- §2 项目信息 -->
<div class="section">
  <div class="section-label">02 · 项目信息</div>
  <div class="field-grid">
    <div class="field">
      <label>PROJECT_NAME<span class="req">*</span></label>
      <input id="projectName" type="text" placeholder="my-cf-pages">
      <div class="field-hint">Pages 项目名，不含空格</div>
    </div>
    <div class="field">
      <label>UPLOAD_DIR<span class="req">*</span></label>
      <input id="uploadDir" type="text" placeholder="C:\path\to\dist">
      <div class="field-hint">本地部署文件夹完整路径</div>
    </div>
  </div>
</div>

<hr>

<!-- §3 兼容性 -->
<div class="section">
  <div class="section-label">03 · 兼容性</div>
  <div class="field-grid">
    <div class="field">
      <label>兼容性日期</label>
      <input id="compatDate" type="text" placeholder="YYYY-MM-DD">
      <div class="field-hint">留空使用当天</div>
    </div>
    <div class="field">
      <label>兼容性标志</label>
      <input id="compatFlags" type="text" placeholder="nodejs_compat（可选）">
      <div class="field-hint">多个用逗号分隔</div>
    </div>
  </div>
</div>

<hr>

<!-- §4 环境变量 -->
<div class="section">
  <div class="section-label">04 · 环境变量</div>
  <div class="var-list" id="envList"></div>
  <button class="add-btn" onclick="addEnvRow()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    添加变量
  </button>
  <div class="info">前两行为锁定行（ADMIN / UUID），可继续添加自定义变量</div>
</div>

<hr>

<!-- §5 KV 绑定 -->
<div class="section">
  <div class="section-label">05 · KV 绑定</div>
  <div class="toggle-row" id="kvToggle" onclick="toggleKV()">
    <div class="toggle-switch"></div>
    <div class="toggle-label">启用 KV 命名空间绑定</div>
  </div>
  <div class="collapsible" id="kvSection">
    <div class="kv-block">
      <div class="field">
        <label>KV 绑定名称</label>
        <input id="kvBinding" type="text" placeholder="KV" value="KV">
        <div class="field-hint">wrangler binding 名称</div>
      </div>
      <div class="field">
        <label>KV 命名空间名称</label>
        <input id="kvTitle" type="text" placeholder="my-kv-namespace">
        <div class="field-hint">创建新 KV 时使用</div>
      </div>
    </div>
  </div>
</div>

<!-- Generate -->
<button class="generate-btn" onclick="generateBat()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  生成 deploy.bat
</button>

<!-- Preview -->
<div class="preview-section" id="previewSection">
  <hr>
  <div class="preview-head">
    <div class="section-label">预览 &amp; 下载</div>
    <a class="dl-btn" id="downloadBtn" href="#" download="deploy.bat">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      下载 .bat
    </a>
  </div>
  <div class="preview-code" id="previewCode"></div>
</div>

</div>

<script>
// today default
(function(){
  const d = new Date();
  document.getElementById('compatDate').value =
    d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
})();

// KV toggle
let kvEnabled = false;
function toggleKV() {
  kvEnabled = !kvEnabled;
  document.getElementById('kvToggle').classList.toggle('on', kvEnabled);
  document.getElementById('kvSection').classList.toggle('open', kvEnabled);
}

// helpers
const TRASH = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
function esc(s){ return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let envCtr = 0;
function addEnvRow(name='', val='', locked=false) {
  const id = ++envCtr;
  const list = document.getElementById('envList');
  const div = document.createElement('div');
  div.className = 'var-row' + (locked ? ' locked' : '');
  div.dataset.eid = id;
  div.innerHTML = `
    <div class="field">
      <label>变量名称</label>
      <input type="text" placeholder="VAR_NAME" value="${esc(name)}">
    </div>
    <div class="field">
      <label>变量值</label>
      <input type="text" placeholder="value" value="${esc(val)}">
    </div>
    <button class="del-btn" onclick="this.closest('.var-row').remove()" ${locked?'disabled':''} title="删除">${TRASH}</button>`;
  list.appendChild(div);
}

// seed defaults
addEnvRow('ADMIN', 'ADMIN', true);
addEnvRow('UUID', '661471cc-c3c4-45d5-a2e9-3f243330510b', true);

function collectEnv() {
  return [...document.querySelectorAll('#envList .var-row')].map(r => {
    const ins = r.querySelectorAll('input');
    return { name: ins[0].value.trim(), val: ins[1].value.trim() };
  }).filter(v => v.name);
}

// generate
function generateBat() {
  const apiToken    = document.getElementById('apiToken').value.trim();
  const accountId   = document.getElementById('accountId').value.trim();
  const projectName = document.getElementById('projectName').value.trim();
  const uploadDir   = document.getElementById('uploadDir').value.trim();
  const compatDate  = document.getElementById('compatDate').value.trim();
  const kvBinding   = document.getElementById('kvBinding').value.trim() || 'KV';
  const kvTitle     = document.getElementById('kvTitle').value.trim();
  const envVars     = collectEnv();

  if (!apiToken || !accountId) { alert('请填写 API Token 和 Account ID'); return; }
  if (!projectName) { alert('请填写 PROJECT_NAME'); return; }
  if (!uploadDir)   { alert('请填写 UPLOAD_DIR'); return; }
  if (!envVars.length) { alert('至少需要一个环境变量'); return; }

  const var1n = envVars[0]?.name || 'ADMIN';
  const var1v = envVars[0]?.val  || '';
  const var2n = envVars[1]?.name || 'UUID';
  const var2v = envVars[1]?.val  || '';
  const extraSets = envVars.slice(2).map(v => `set ${v.name}=${v.val}`).join('\r\n');

  // build env_vars echo block for patch JSON
  function envEchoBlock(pad) {
    return envVars.map((v, i) => {
      const comma = i < envVars.length - 1 ? ',' : '';
      return `    echo ${pad}"${v.name}": { "value": "${v.val.replace(/"/g,'\\"')}" }${comma}`;
    }).join('\r\n');
  }

  // patch section (env + optional kv)
  function patchSection(pad) {
    let out = `    echo ${pad}"env_vars": {\r\n${envEchoBlock(pad + '  ')}\r\n    echo ${pad}}`;
    if (kvEnabled) {
      out += `,\r\n    echo ${pad}"kv_namespaces": {\r\n    echo ${pad}  "${kvBinding}": { "namespace_id": "!KV_ID!" }\r\n    echo ${pad}}`;
    }
    return out;
  }

  const bat =
`@echo off
if "%1"=="--run" goto :MAIN
cmd /k "%~f0" --run
exit /b

:MAIN
setlocal enabledelayedexpansion
chcp 65001 >nul

set CLOUDFLARE_API_TOKEN=${apiToken}
set CLOUDFLARE_ACCOUNT_ID=${accountId}
set PROJECT_NAME=${projectName}
set UPLOAD_DIR=${uploadDir}
set KV_BINDING_NAME=${kvBinding}
set KV_NAMESPACE_TITLE=${kvTitle}
set bianlinang_0ne=${var1n}
set bianlinang_0ne_zhi=${var1v}
set bianlinang_two=${var2n}
set bianlinang_two_zhi=${var2v}
${extraSets ? extraSets + '\r\n' : ''}
set BASE_URL=https://api.cloudflare.com/client/v4/accounts/%CLOUDFLARE_ACCOUNT_ID%
set CF_API_TOKEN=!CLOUDFLARE_API_TOKEN!
set CF_ACCOUNT_ID=!CLOUDFLARE_ACCOUNT_ID!

cls
echo.
echo   ==========================================
echo      Cloudflare Pages 直传部署工具
echo   ==========================================
echo.

:: ================================================
:: 清理临时文件
:: ================================================
del /q req_s1.json req_s2.json res_s1.json res_s2.json res_s3.json res_status.json patch_body.json >nul 2>&1
if exist "%~dp0.wrangler" rd /s /q "%~dp0.wrangler"
if exist "node_modules\\.cache\\wrangler" rd /s /q "node_modules\\.cache\\wrangler"

:: ================================================
:: 交互确认
:: ================================================
:INPUT_PROJECT_NAME
set PROJECT_NAME_INPUT=
set /p PROJECT_NAME_INPUT=  项目名称 [默认: !PROJECT_NAME!，回车使用]: 
if "!PROJECT_NAME_INPUT!"=="" set PROJECT_NAME_INPUT=!PROJECT_NAME!
set PROJECT_NAME=!PROJECT_NAME_INPUT!

echo.
:INPUT_UPLOAD_DIR
set UPLOAD_DIR_INPUT=
set /p UPLOAD_DIR_INPUT=  上传目录 [默认: !UPLOAD_DIR!，回车使用]: 
if "!UPLOAD_DIR_INPUT!"=="" set UPLOAD_DIR_INPUT=!UPLOAD_DIR!
set UPLOAD_DIR=!UPLOAD_DIR_INPUT!
if "!UPLOAD_DIR:~-1!"=="\\" set UPLOAD_DIR=!UPLOAD_DIR:~0,-1!
if not exist "!UPLOAD_DIR!\\" (
    echo   [!] 路径不存在，请重新输入
    goto :INPUT_UPLOAD_DIR
)

echo.
set SKIP_KV=${kvEnabled ? '0' : '1'}

for /f "usebackq delims=" %%D in (\`powershell -NoProfile -Command "(Get-Date).ToString('yyyy-MM-dd')"\`) do set TODAY=%%D
set COMPAT_DATE=
set /p COMPAT_DATE=  兼容性日期 [默认: !TODAY!，回车使用]: 
if "!COMPAT_DATE!"=="" set COMPAT_DATE=!TODAY!

echo.
set COMPAT_FLAGS_INPUT=
set /p COMPAT_FLAGS_INPUT=  兼容性标志 [如: nodejs_compat，回车跳过]: 

echo.
echo   +------------------------------------------+
echo     项目名称   : !PROJECT_NAME!
echo     上传目录   : !UPLOAD_DIR!
echo     变量1      : !bianlinang_0ne!
echo     变量2      : !bianlinang_two!
if !SKIP_KV!==0 echo     KV 名称    : !KV_NAMESPACE_TITLE!
if !SKIP_KV!==0 echo     KV 绑定    : !KV_BINDING_NAME!
if !SKIP_KV!==1 echo     KV         : (跳过)
echo     兼容日期   : !COMPAT_DATE!
echo   +------------------------------------------+
echo.
set CONFIRM=
set /p CONFIRM=  确认部署？[回车/Y=是  N=退出]: 
if /i "!CONFIRM!"=="N" (echo   已取消。& pause & exit /b 0)

:: ================================================
:: STEP 1 — 创建 Pages 项目
:: ================================================
echo.
echo   STEP 1/5  创建 Pages 项目

:CREATE_PROJECT
> req_s1.json echo {"name":"!PROJECT_NAME!","production_branch":"main"}
curl -s -X POST "%BASE_URL%/pages/projects" -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" -H "Content-Type: application/json" -d @req_s1.json -o res_s1.json

findstr /c:"\\"success\\": true" res_s1.json >nul 2>&1
if not errorlevel 1 (echo   [OK] 项目创建成功 & goto :STEP2)
findstr /c:"already exists" res_s1.json >nul 2>&1
if not errorlevel 1 (echo   [OK] 项目已存在，继续... & goto :STEP2)

echo   [NG] 创建失败:
type res_s1.json
echo.
set C=
set /p C=  [1] 重新输入名称  [2/回车] 继续: 
if "!C!"=="1" (set /p PROJECT_NAME=  新项目名称: & goto :CREATE_PROJECT)
echo   跳过，继续...

:: ================================================
:: STEP 2 — 创建 KV 命名空间
:: ================================================
:STEP2
set KV_ID=
if !SKIP_KV!==1 goto :STEP3

echo.
echo   STEP 2/5  创建 KV 命名空间

:CREATE_KV
set KV_NAMESPACE_TITLE_INPUT=
set /p KV_NAMESPACE_TITLE_INPUT=  KV 名称 [默认: !KV_NAMESPACE_TITLE!，回车使用]: 
if "!KV_NAMESPACE_TITLE_INPUT!"=="" set KV_NAMESPACE_TITLE_INPUT=!KV_NAMESPACE_TITLE!
set KV_NAMESPACE_TITLE=!KV_NAMESPACE_TITLE_INPUT!

> req_s2.json echo {"title":"!KV_NAMESPACE_TITLE!"}
curl -s -X POST "%BASE_URL%/storage/kv/namespaces" -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" -H "Content-Type: application/json" -d @req_s2.json -o res_s2.json

findstr /c:"\\"success\\":true" res_s2.json >nul 2>&1
if not errorlevel 1 (
    for /f "usebackq delims=" %%I in (\`powershell -NoProfile -Command "(Get-Content 'res_s2.json' | ConvertFrom-Json).result.id"\`) do set KV_ID=%%I
    echo   [OK] KV 创建成功，ID: !KV_ID!
    goto :STEP3
)

echo   [NG] KV 创建失败（名称已存在或其他错误）
type res_s2.json
echo.
set C=
set /p C=  [1] 重新输入名称重试  [2/回车] 跳过KV绑定: 
if "!C!"=="1" goto :CREATE_KV
echo   跳过KV绑定，继续...
set SKIP_KV=1

:: ================================================
:: STEP 3 — 配置项目
:: ================================================
:STEP3
echo.
echo   STEP 3/5  配置项目

set "PATCH_JSON_PATH=%~dp0patch_body.json"
if exist "%PATCH_JSON_PATH%" del /q "%PATCH_JSON_PATH%"
chcp 65001 >nul

(
echo {
echo   "deployment_configs": {
echo     "production": {
echo       "compatibility_date": "!COMPAT_DATE!",
echo       "compatibility_flags": [],
${patchSection('      ')}
echo     },
echo     "preview": {
echo       "compatibility_date": "!COMPAT_DATE!",
echo       "compatibility_flags": [],
${patchSection('      ')}
echo     }
echo   }
echo }
) > "%PATCH_JSON_PATH%"

if not exist "%PATCH_JSON_PATH%" (echo [NG] 生成配置失败 & pause & goto :STEP4)

curl -s -X PATCH "%BASE_URL%/pages/projects/!PROJECT_NAME!" -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" -H "Content-Type: application/json" -d "@%PATCH_JSON_PATH%" -o res_s3.json

findstr /c:"\\"success\\":true" res_s3.json >nul 2>&1
if not errorlevel 1 (echo   [OK] 配置成功 & goto :STEP4)
findstr /c:"\\"success\\": true" res_s3.json >nul 2>&1
if not errorlevel 1 (echo   [OK] 配置成功 & goto :STEP4)
echo   [NG] 配置失败:
type res_s3.json
echo.

:: ================================================
:: STEP 4 — 部署文件
:: ================================================
:STEP4
echo.
echo   STEP 4/5  部署文件

if exist "node_modules\\.cache\\wrangler" rd /s /q "node_modules\\.cache\\wrangler"
if exist "%APPDATA%\\.wrangler" rd /s /q "%APPDATA%\\.wrangler\\config" 2>nul
if exist "%~dp0.wrangler" rd /s /q "%~dp0.wrangler"

call npx wrangler pages deploy "!UPLOAD_DIR!" --project-name "!PROJECT_NAME!"
if %ERRORLEVEL% equ 0 (echo. & echo   [OK] 部署成功) else (echo. & echo   [NG] 部署出现错误，请检查上方日志)

:: ================================================
:: STEP 5 — 查询状态
:: ================================================
:STEP5
echo.
echo   STEP 5/5  查询部署状态

curl -s -X GET "%BASE_URL%/pages/projects/!PROJECT_NAME!/deployments" -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" -o res_status.json
for /f "usebackq delims=" %%S in (\`powershell -NoProfile -Command "$r=(Get-Content 'res_status.json'|ConvertFrom-Json).result; if($r -and $r.Count -gt 0){$r[0].latest_stage.name+' - '+$r[0].latest_stage.status}else{'(无部署记录)'}"\`) do echo   状态: %%S

:: ================================================
:: 清理
:: ================================================
del /q req_s1.json req_s2.json res_s1.json res_s2.json res_s3.json res_status.json patch_body.json >nul 2>&1

echo.
echo   ==========================================
echo            全部步骤执行完毕
echo   ==========================================
echo.
pause
exit /b 0`;

  const ps = document.getElementById('previewSection');
  const pc = document.getElementById('previewCode');
  const dl = document.getElementById('downloadBtn');

  ps.classList.add('visible');
  pc.textContent = bat;

  const blob = new Blob(['\uFEFF' + bat], { type: 'text/plain;charset=utf-8' });
  dl.href = URL.createObjectURL(blob);
  dl.download = `deploy_${projectName || 'cf'}.bat`;

  setTimeout(() => ps.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}
</script>
</body>
</html>
