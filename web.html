<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CF Pages 部署配置器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300;400;500&family=Inter:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&family=Space+Grotesk:wght@400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── BASE TOKENS (minimal) ── */
:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --border: #e2e0db;
  --border-strong: #c8c5be;
  --text: #1a1917;
  --text-mid: #6b6860;
  --text-dim: #a09d98;
  --accent: #1a1917;
  --accent-inv: #f8f7f4;
  --accent-hover: #333;
  --red: #c0392b;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --radius: 4px;
  --locked-bg: #f3f2ef;
  --border-w: 1px;
}

/* ── TERMINAL ── */
[data-theme="terminal"] {
  --bg: #0c0e0f;
  --surface: #111416;
  --border: #1e2428;
  --border-strong: #2d3740;
  --text: #c8dde0;
  --text-mid: #5a7a80;
  --text-dim: #3a5055;
  --accent: #00c8a0;
  --accent-inv: #0c0e0f;
  --accent-hover: #00e8bc;
  --red: #ff4d6a;
  --mono: 'Geist Mono', monospace;
  --sans: 'Geist Mono', monospace;
  --radius: 3px;
  --locked-bg: #0f1315;
  --border-w: 1px;
}

/* ── NOTION ── */
[data-theme="notion"] {
  --bg: #ffffff;
  --surface: #f7f6f3;
  --border: #e9e8e5;
  --border-strong: #d3d2ce;
  --text: #37352f;
  --text-mid: #787672;
  --text-dim: #b5b4b0;
  --accent: #2383e2;
  --accent-inv: #ffffff;
  --accent-hover: #1a6bc4;
  --red: #e03e3e;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Inter', sans-serif;
  --radius: 6px;
  --locked-bg: #eeede9;
  --border-w: 1px;
}

/* ── EDITORIAL ── */
[data-theme="editorial"] {
  --bg: #f4efe6;
  --surface: #faf7f1;
  --border: #ddd5c2;
  --border-strong: #bfb49e;
  --text: #1c1a16;
  --text-mid: #6b6250;
  --text-dim: #a89e8a;
  --accent: #b84a2e;
  --accent-inv: #f4efe6;
  --accent-hover: #962810;
  --red: #b84a2e;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Fraunces', serif;
  --radius: 2px;
  --locked-bg: #ede8de;
  --border-w: 1px;
}

/* ── BRUTAL ── */
[data-theme="brutal"] {
  --bg: #f0f0e8;
  --surface: #ffffff;
  --border: #000000;
  --border-strong: #000000;
  --text: #000000;
  --text-mid: #333333;
  --text-dim: #666666;
  --accent: #000000;
  --accent-inv: #ffeb00;
  --accent-hover: #111;
  --red: #ff2200;
  --mono: 'Space Grotesk', sans-serif;
  --sans: 'Space Grotesk', sans-serif;
  --radius: 0px;
  --locked-bg: #e8e8e0;
  --border-w: 2px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  transition: background .22s, color .22s;
}

/* ── THEME BAR ── */
.theme-bar {
  position: fixed;
  top: 16px;
  right: 18px;
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 8px;
}
.theme-bar-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: .1em;
  text-transform: uppercase;
  transition: color .22s;
}
.theme-pills {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: var(--border-w) solid var(--border);
  border-radius: 99px;
  padding: 4px 6px;
  transition: background .22s, border-color .22s;
}
.tp {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform .15s, border-color .15s, box-shadow .15s;
  position: relative;
  flex-shrink: 0;
}
.tp:hover { transform: scale(1.18); }
.tp.active { border-color: var(--text); box-shadow: 0 0 0 1px var(--bg); }
/* tooltip */
.tp::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 3px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .12s;
}
.tp:hover::after { opacity: 1; }

.tp-minimal   { background: #e8e6e1; }
.tp-terminal  { background: #00c8a0; }
.tp-notion    { background: #2383e2; }
.tp-editorial { background: #b84a2e; }
.tp-brutal    { background: #ffeb00; border-color: #000 !important; }

/* ── LAYOUT ── */
.wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 64px 24px 96px;
}

/* header */
.header { margin-bottom: 52px; }
.header-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 14px;
  transition: color .22s;
}
h1 {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
  transition: color .22s, font-family .22s;
}
[data-theme="editorial"] h1 {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 26px;
  font-weight: 300;
}
[data-theme="brutal"] h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.02em;
}
.header-sub { font-size: 13px; color: var(--text-mid); transition: color .22s; }

hr {
  border: none;
  border-top: var(--border-w) solid var(--border);
  margin: 36px 0;
  transition: border-color .22s, border-width .22s;
}

/* section */
.section { margin-bottom: 32px; }
.section-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: color .22s;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
  transition: background .22s;
}
[data-theme="brutal"] .section-label {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 12px;
}

/* fields */
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 560px) { .field-grid { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  letter-spacing: .06em;
  transition: color .22s;
}
[data-theme="brutal"] .field label {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 11px;
}
.field label .req { color: var(--red); margin-left: 2px; }

.field input {
  background: var(--surface);
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  padding: 9px 11px;
  font-family: var(--mono);
  font-size: 12.5px;
  color: var(--text);
  outline: none;
  transition: border-color .15s, background .22s, color .22s;
  width: 100%;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-dim); }

.field-hint {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--mono);
  transition: color .22s;
}

/* info */
.info {
  border-left: 2px solid var(--border-strong);
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-mid);
  margin-top: 12px;
  line-height: 1.7;
  transition: border-color .22s, color .22s;
}
[data-theme="terminal"] .info { border-color: var(--accent); opacity: .7; }
[data-theme="notion"]   .info { border-color: var(--accent); background: #2383e20a; border-radius: 0 4px 4px 0; }
[data-theme="brutal"]   .info { border-left-width: 3px; }
.info strong { color: var(--text); font-weight: 500; }

/* var rows */
.var-list { display: flex; flex-direction: column; gap: 8px; }
.var-row {
  display: grid;
  grid-template-columns: 1fr 1fr 32px;
  gap: 8px;
  align-items: end;
}
@media (max-width: 560px) { .var-row { grid-template-columns: 1fr; } }
.var-row.locked .field input { background: var(--locked-bg); color: var(--text-mid); }

.add-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: transparent;
  border: var(--border-w) solid var(--border-strong);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: all .15s;
  margin-top: 10px;
}
.add-btn:hover { border-color: var(--accent); color: var(--text); }
[data-theme="brutal"] .add-btn { font-weight: 600; }

.del-btn {
  width: 32px;
  height: 34px;
  background: transparent;
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.del-btn:hover { border-color: var(--red); color: var(--red); }
.del-btn:disabled { opacity: .25; cursor: not-allowed; pointer-events: none; }

/* kv toggle */
.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  user-select: none;
  transition: border-color .15s, background .22s;
  margin-bottom: 12px;
}
.toggle-row:hover { border-color: var(--border-strong); }
.toggle-row.on { border-color: var(--accent); }

.toggle-sw {
  width: 32px;
  height: 18px;
  background: var(--border-strong);
  border-radius: 9px;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
[data-theme="brutal"] .toggle-sw { border-radius: 2px; }
.toggle-sw::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  background: var(--bg);
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: transform .15s;
  box-shadow: 0 1px 2px rgba(0,0,0,.2);
}
[data-theme="brutal"] .toggle-sw::after { border-radius: 1px; }
.toggle-row.on .toggle-sw { background: var(--accent); }
.toggle-row.on .toggle-sw::after { transform: translateX(14px); }
.toggle-lbl { font-size: 13px; color: var(--text-mid); transition: color .22s; }
.toggle-row.on .toggle-lbl { color: var(--text); }

.collapsible { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
.collapsible.open { max-height: 300px; }

.kv-block {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px;
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  transition: all .22s;
}
@media (max-width: 560px) { .kv-block { grid-template-columns: 1fr; } }

/* generate */
.generate-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: var(--accent-inv);
  border: var(--border-w) solid var(--accent);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .15s, color .22s;
  margin-top: 40px;
}
.generate-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.generate-btn:active { opacity: .75; }
[data-theme="brutal"] .generate-btn {
  font-weight: 700;
  font-size: 13px;
  box-shadow: 3px 3px 0 var(--text);
  transition: box-shadow .1s, transform .1s, background .15s;
}
[data-theme="brutal"] .generate-btn:hover {
  background: var(--accent-hover);
  box-shadow: 5px 5px 0 var(--text);
  transform: translate(-1px,-1px);
}
[data-theme="brutal"] .generate-btn:active {
  box-shadow: 1px 1px 0 var(--text);
  transform: translate(1px,1px);
}

/* preview */
.preview-section { margin-top: 40px; display: none; }
.preview-section.visible { display: block; }

.preview-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.preview-head .section-label { margin-bottom: 0; flex: 1; }

.dl-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: var(--border-w) solid var(--accent);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  text-decoration: none;
  transition: background .15s, color .15s, border-color .22s;
}
.dl-btn:hover { background: var(--accent); color: var(--accent-inv); }
[data-theme="brutal"] .dl-btn { font-weight: 600; }

.preview-code {
  background: var(--surface);
  border: var(--border-w) solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.65;
  color: var(--text-mid);
  overflow-x: auto;
  white-space: pre;
  max-height: 400px;
  overflow-y: auto;
  transition: background .22s, border-color .22s, color .22s;
}
.preview-code::-webkit-scrollbar { width: 3px; height: 3px; }
.preview-code::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── Theme bar ── -->
<div class="theme-bar">
  <span class="theme-bar-label">主题</span>
  <div class="theme-pills">
    <div class="tp tp-minimal  active" data-tip="简约" onclick="setTheme('minimal',this)"></div>
    <div class="tp tp-terminal"        data-tip="终端" onclick="setTheme('terminal',this)"></div>
    <div class="tp tp-notion"          data-tip="Notion" onclick="setTheme('notion',this)"></div>
    <div class="tp tp-editorial"       data-tip="杂志" onclick="setTheme('editorial',this)"></div>
    <div class="tp tp-brutal"          data-tip="Brutal" onclick="setTheme('brutal',this)"></div>
  </div>
</div>

<div class="wrap">

<!-- Header -->
<div class="header">
  <div class="header-eyebrow">Cloudflare Pages — Deploy Configurator</div>
  <h1>部署脚本生成器</h1>
  <p class="header-sub">填写参数，生成定制化 .bat 部署脚本</p>
</div>

<!-- §1 -->
<div class="section">
  <div class="section-label">01 · API 凭证</div>
  <div class="field-grid">
    <div class="field">
      <label>API_TOKEN<span class="req">*</span></label>
      <input id="apiToken" type="text" placeholder="cfat_...">
    </div>
    <div class="field">
      <label>ACCOUNT_ID<span class="req">*</span></label>
      <input id="accountId" type="text" placeholder="32位 hex">
    </div>
  </div>
  <div class="info">Token 需要 <strong>KV Storage</strong> 和 <strong>Pages</strong> 读写权限</div>
</div>

<hr>

<!-- §2 -->
<div class="section">
  <div class="section-label">02 · 项目信息</div>
  <div class="field-grid">
    <div class="field">
      <label>PROJECT_NAME<span class="req">*</span></label>
      <input id="projectName" type="text" placeholder="my-cf-pages">
      <div class="field-hint">Pages 项目名，不含空格</div>
    </div>
    <div class="field">
      <label>UPLOAD_DIR<span class="req">*</span></label>
      <input id="uploadDir" type="text" placeholder="C:\path\to\dist">
      <div class="field-hint">本地部署文件夹完整路径</div>
    </div>
  </div>
</div>

<hr>

<!-- §3 -->
<div class="section">
  <div class="section-label">03 · 兼容性</div>
  <div class="field-grid">
    <div class="field">
      <label>兼容性日期</label>
      <input id="compatDate" type="text" placeholder="YYYY-MM-DD">
      <div class="field-hint">留空使用当天</div>
    </div>
    <div class="field">
      <label>兼容性标志</label>
      <input id="compatFlags" type="text" placeholder="nodejs_compat（可选）">
      <div class="field-hint">多个用逗号分隔</div>
    </div>
  </div>
</div>

<hr>

<!-- §4 -->
<div class="section">
  <div class="section-label">04 · 环境变量</div>
  <div class="var-list" id="envList"></div>
  <button class="add-btn" onclick="addEnvRow()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    添加变量
  </button>
  <div class="info">前两行为锁定行（ADMIN / UUID），可继续添加自定义变量</div>
</div>

<hr>

<!-- §5 -->
<div class="section">
  <div class="section-label">05 · KV 绑定</div>
  <div class="toggle-row" id="kvToggle" onclick="toggleKV()">
    <div class="toggle-sw"></div>
    <div class="toggle-lbl">启用 KV 命名空间绑定</div>
  </div>
  <div class="collapsible" id="kvSection">
    <div class="kv-block">
      <div class="field">
        <label>KV 绑定名称</label>
        <input id="kvBinding" type="text" placeholder="KV" value="KV">
        <div class="field-hint">wrangler binding 名称</div>
      </div>
      <div class="field">
        <label>KV 命名空间名称</label>
        <input id="kvTitle" type="text" placeholder="my-kv-namespace">
        <div class="field-hint">创建新 KV 时使用</div>
      </div>
    </div>
  </div>
</div>

<!-- Generate -->
<button class="generate-btn" onclick="generateBat()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  生成 deploy.bat
</button>

<!-- Preview -->
<div class="preview-section" id="previewSection">
  <hr>
  <div class="preview-head">
    <div class="section-label">预览 &amp; 下载</div>
    <a class="dl-btn" id="downloadBtn" href="#" download="deploy.bat">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      下载 .bat
    </a>
  </div>
  <div class="preview-code" id="previewCode"></div>
</div>

</div>

<script>
// today
(function(){
  const d = new Date();
  document.getElementById('compatDate').value =
    d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
})();

// theme
function setTheme(name, el) {
  if (name === 'minimal') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', name);
  document.querySelectorAll('.tp').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}

// kv toggle
let kvEnabled = false;
function toggleKV() {
  kvEnabled = !kvEnabled;
  document.getElementById('kvToggle').classList.toggle('on', kvEnabled);
  document.getElementById('kvSection').classList.toggle('open', kvEnabled);
}

// helpers
const TRASH = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
function esc(s){ return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let envCtr = 0;
function addEnvRow(name='', val='', locked=false) {
  const list = document.getElementById('envList');
  const div = document.createElement('div');
  div.className = 'var-row' + (locked ? ' locked' : '');
  div.innerHTML = `
    <div class="field">
      <label>变量名称</label>
      <input type="text" placeholder="VAR_NAME" value="${esc(name)}">
    </div>
    <div class="field">
      <label>变量值</label>
      <input type="text" placeholder="value" value="${esc(val)}">
    </div>

function collectEnv() {
  return [...document.querySelectorAll('#envList .var-row')].map(r => {
    const ins = r.querySelectorAll('input');
    return { name: ins[0].value.trim(), val: ins[1].value.trim() };
  }).filter(v => v.name);
}

  const kvTitle     = document.getElementById('kvTitle').value.trim();
  const envVars     = collectEnv();

  if (!apiToken || !accountId) { alert('请填写 API Token 和 Account ID'); return; }
  if (!projectName)            { alert('请填写 PROJECT_NAME'); return; }
  if (!uploadDir)              { alert('请填写 UPLOAD_DIR'); return; }
  if (!envVars.length)         { alert('至少需要一个环境变量'); return; }

  const var1n = envVars[0]?.name || 'ADMIN';
  const var1v = envVars[0]?.val  || '';
  const var2n = envVars[1]?.name || 'UUID';
  const var2v = envVars[1]?.val  || '';
  const extraSets = envVars.slice(2).map(v => `set ${v.name}=${v.val}`).join('\r\n');

  function envEchoBlock(pad) {
    return envVars.map((v, i) => {
      const comma = i < envVars.length - 1 ? ',' : '';
      return `    echo ${pad}"${v.name}": { "value": "${v.val.replace(/"/g,'\\"')}" }${comma}`;
    }).join('\r\n');
  }

  function patchSection(pad) {
    let out = `    echo ${pad}"env_vars": {\r\n${envEchoBlock(pad+'  ')}\r\n    echo ${pad}}`;
    if (kvEnabled) {
      out += `,\r\n    echo ${pad}"kv_namespaces": {\r\n    echo ${pad}  "${kvBinding}": { "namespace_id": "!KV_ID!" }\r\n    echo ${pad}}`;
    }
    return out;
  }

  const bat =

${extraSets ? extraSets + '\r\n' : ''}

echo.

:: ── STEP 1 创建 Pages 项目 ──
echo.
echo   STEP 1/5  创建 Pages 项目

:CREATE_PROJECT
> req_s1.json echo {"name":"!PROJECT_NAME!","production_branch":"main"}
curl -s -X POST "%BASE_URL%/pages/projects" -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" -H "Content-Type: application/json" -d @req_s1.json -o res_s1.json

curl -s -X POST "%BASE_URL%/storage/kv/namespaces" -H "Authorization: Bearer %CLOUDFLARE_API_TOKEN%" -H "Content-Type: application/json" -d @req_s2.json -o res_s2.json
